; PlatformIO project configuration — HackPack Turret Tracker ESP32-CAM
; Board: AI Thinker ESP32-CAM  (ESP32S, OV3660 camera, PSRAM)
;
; Initial flash (USB): pio run -t upload
; OTA flash:           pio run -e esp32cam_ota -t upload
; Monitor:             pio device monitor

[env:esp32cam]
platform  = espressif32
board     = esp32cam
framework = arduino

; 921600 baud gives fast flashes; drop to 460800 if your FTDI adapter drops bytes
upload_speed   = 921600
monitor_speed  = 115200
monitor_filters = esp32_exception_decoder

; esp32-camera is bundled with the Espressif platform — no extra lib needed.
; ArduinoOTA and WebServer are part of the Arduino-ESP32 core.
lib_deps =

board_build.partitions = min_spiffs.csv

build_flags =
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

[env:esp32cam_ota]
extends         = env:esp32cam
upload_protocol = espota
upload_port     = turret-cam.local  ; mDNS hostname set in ArduinoOTA.setHostname()
; espota opens a TCP server on this port and the ESP32 connects back to it.
; Fix this port so you can add a permanent firewall exception for it.
upload_flags    =
    --host_port=42428
